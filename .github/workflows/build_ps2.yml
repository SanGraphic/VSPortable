name: Build PS2 ROM

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apk add make build-base cdrkit || true
          apt-get update && apt-get install -y make build-essential genisoimage 2>/dev/null || true

      - name: Build PS2 ELF
        run: |
          make -f Makefile.ps2
          mkdir -p dist_ps2
          cp vsport_ps2.elf dist_ps2/VSPORT.ELF

      - name: Assemble disc contents
        run: |
          cp v_quickjs_clean.js dist_ps2/SHIM.JS
          cp .webpack/renderer/vendors.bundle.js dist_ps2/VENDORS.JS
          cp .webpack/renderer/main.bundle.obfuscated.js dist_ps2/MAIN.JS
          # Create a dummy padding file (20MB) to satisfy some PS2 drivers
          dd if=/dev/zero of=dist_ps2/DUMMY.DAT bs=1M count=20
          # PS2 BIOS requires CRLF line endings in SYSTEM.CNF
          printf 'BOOT2 = cdrom0:\\VSPORT.ELF;1\r\nVER = 1.00\r\nVMODE = NTSC\r\n' > dist_ps2/SYSTEM.CNF

      - name: Build ISO
        run: |
          # genisoimage -sort: higher weight = placed earlier on disc
          cat > sort.txt << 'EOF'
          SYSTEM.CNF  100
          VSPORT.ELF  90
          SHIM.JS     80
          VENDORS.JS  70
          MAIN.JS     60
          DUMMY.DAT   10
          EOF
          sed -i 's/^[[:space:]]*//' sort.txt
          genisoimage \
            -o vsport_ps2.iso \
            -V "VSPORT" \
            -sysid "PLAYSTATION" \
            -l -J -R \
            -sort sort.txt \
            dist_ps2/

      - name: Verify ISO Structure
        run: |
          isoinfo -l -i vsport_ps2.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: vsport-ps2-rom
          path: vsport_ps2.iso
