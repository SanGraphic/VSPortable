name: Build PS2 ROM

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apk add make build-base cdrkit || true
          apt-get update && apt-get install -y make build-essential genisoimage 2>/dev/null || true

      - name: Build PS2 ELF
        run: |
          make -f Makefile.ps2
          mkdir -p dist_ps2
          cp vsport_ps2.elf dist_ps2/VSPORT.ELF

      - name: Assemble disc contents
        run: |
          cp .webpack/renderer/vendors.bundle.beautified.js dist_ps2/VENDORS.JS
          cp .webpack/renderer/main.bundle.beautified.js dist_ps2/MAIN.JS
          # PS2 BIOS requires CRLF line endings in SYSTEM.CNF
          printf 'BOOT2 = cdrom0:\\VSPORT.ELF;1\r\nVER = 1.00\r\nVMODE = NTSC\r\n' > dist_ps2/SYSTEM.CNF

      - name: Build ISO
        run: |
          # genisoimage -sort: higher weight = placed earlier on disc
          # SYSTEM.CNF MUST be at the start or PS2 BIOS will not boot
          cat > sort.txt << 'EOF'
          SYSTEM.CNF  100
          VSPORT.ELF  90
          VENDORS.JS  50
          MAIN.JS     40
          EOF
          # Strip leading spaces from sort file (heredoc indentation)
          sed -i 's/^[[:space:]]*//' sort.txt
          genisoimage \
            -o vsport_ps2.iso \
            -V "VSPORT" \
            -l \
            -input-charset iso8859-1 \
            -sort sort.txt \
            dist_ps2/

      - name: Verify SYSTEM.CNF placement
        run: |
          # Dump ISO directory to confirm SYSTEM.CNF is listed first
          isoinfo -d -i vsport_ps2.iso || true
          isoinfo -l -i vsport_ps2.iso | head -20 || true

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: vsport-ps2-rom
          path: vsport_ps2.iso
