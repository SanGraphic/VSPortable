name: Build PS2 ROM

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apk add make build-base cdrkit || (apt-get update && apt-get install -y make build-essential genisoimage)

      - name: Build PS2 ELF
        run: |
          make -f Makefile.ps2
          mkdir -p dist_ps2
          cp vsport_ps2.elf dist_ps2/VSPORT.ELF

      - name: Assemble ISO contents
        run: |
          cp .webpack/renderer/vendors.bundle.beautified.js dist_ps2/VENDORS.JS
          cp .webpack/renderer/main.bundle.beautified.js dist_ps2/MAIN.JS
          printf 'BOOT2 = cdrom0:\\VSPORT.ELF;1\nVER = 1.00\nVMODE = NTSC\n' > dist_ps2/SYSTEM.CNF

      - name: Build ISO
        run: |
          genisoimage -o vsport_ps2.iso \
            -R -J \
            -V "VSPORT" \
            -publisher "VSport" \
            -input-charset iso8859-1 \
            -iso-level 3 \
            dist_ps2/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: vsport-ps2-rom
          path: vsport_ps2.iso
