name: Build PS2 ROM

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apk add make build-base git cmake || true
          apt-get update && apt-get install -y make build-essential git cmake 2>/dev/null || true

      - name: Build PS2 ELF
        run: |
          make -f Makefile.ps2
          mkdir -p dist_ps2
          cp vsport_ps2.elf dist_ps2/VSPORT.ELF

      - name: Assemble disc contents
        run: |
          cp .webpack/renderer/vendors.bundle.beautified.js dist_ps2/VENDORS.JS
          cp .webpack/renderer/main.bundle.beautified.js dist_ps2/MAIN.JS
          # PS2 BIOS requires CRLF line endings in SYSTEM.CNF
          printf 'BOOT2 = cdrom0:\\VSPORT.ELF;1\r\nVER = 1.00\r\nVMODE = NTSC\r\n' > dist_ps2/SYSTEM.CNF

      - name: Build mkps2iso
        run: |
          git clone --depth=1 --recursive https://github.com/Lameguy64/mkpsxiso.git /tmp/mkpsxiso
          cd /tmp/mkpsxiso
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          cp build/mkpsxiso /usr/local/bin/mkps2iso 2>/dev/null || cp build/bin/mkpsxiso /usr/local/bin/mkps2iso 2>/dev/null || find /tmp/mkpsxiso/build -name "mkpsxiso" -exec cp {} /usr/local/bin/mkps2iso \;

      - name: Build ISO with mkps2iso
        run: |
          mkps2iso vsport.xml

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: vsport-ps2-rom
          path: vsport_ps2.iso
